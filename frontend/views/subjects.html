<div class="welcome-row d-flex justify-content-between align-items-center">
    <div>
        <h1>Course & Subject Syllabus</h1>
        <p class="welcome-sub">Configure subjects, syllabus credits, and assign faculty.</p>
    </div>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addSubjectModal">
        📚 Add Subject
    </button>
</div>

<div class="widget">
    <div class="table-responsive">
        <table class="table table-hover align-middle" style="margin-bottom: 0;">
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Subject Name</th>
                    <th>Dept / Sem</th>
                    <th>Credits</th>
                    <th>Assigned Faculty</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="admin-subjects-table-body">
                <tr>
                    <td colspan="6">
                        <div class="text-center py-4">
                            <div class="spinner-border text-secondary spinner-border-sm" role="status"></div>
                            <span class="ms-2">Loading subjects syllabus...</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Add Subject Modal -->
<div class="modal fade" id="addSubjectModal" tabindex="-1" aria-labelledby="addSubjectModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addSubjectModalLabel">Add Subject to Curriculum</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form onsubmit="addSubjectSubmit(event)">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Subject ID (Internal)</label>
                        <input type="text" id="add-s-id" class="form-control" required placeholder="sub_cse_301">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Subject Code</label>
                        <input type="text" id="add-s-code" class="form-control" required placeholder="22CS301" style="text-transform: uppercase;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Subject Name</label>
                        <input type="text" id="add-s-name" class="form-control" required placeholder="Data Structures & Algorithms">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Department</label>
                        <select id="add-s-dept" class="form-select" required>
                            <option value="" disabled selected>Select Department</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Semester</label>
                        <input type="number" id="add-s-sem" class="form-control" required min="1" max="10" value="3">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Credits</label>
                        <input type="number" id="add-s-credits" class="form-control" required min="1" max="6" value="4">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Assign Faculty</label>
                        <select id="add-s-faculty" class="form-select" required>
                            <option value="" disabled selected>Select Faculty Member</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Subject</button>
                </div>
            </form>
        </div>
    </div>
</div>
