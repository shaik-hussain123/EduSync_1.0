<div class="notifications-page">
    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
        <div>
            <h2 class="pf-heading">Notifications</h2>
            <p class="pf-sub">Stay updated with your latest activity</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn-secondary-erp" id="btn-mark-all-read" type="button">Mark All Read</button>
        </div>
    </div>

    <div id="notifications-alert" class="alert" style="display:none;" role="alert"></div>

    <div class="pf-card mb-4">
        <div class="d-flex flex-wrap gap-2 mb-3">
            <button class="btn-primary-erp btn-sm" data-filter="all">All</button>
            <button class="btn-secondary-erp btn-sm" data-filter="unread">Unread</button>
            <button class="btn-secondary-erp btn-sm" data-filter="read">Read</button>
        </div>
        <div id="notifications-list"></div>
    </div>
</div>
