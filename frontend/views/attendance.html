<div id="student-attendance-view">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>Attendance</h2>
            <p class="text-muted">Scan QR codes and track your attendance record.</p>
        </div>
    </div>

    <!-- Alert Box -->
    <div class="alert" id="att-alert" style="display:none;" role="alert"></div>

    <div class="att-grid">
        <!-- Left Column: Scanner & Status -->
        <div>
            <div class="att-card text-center">
                <h4>Scan QR Code</h4>
                <p class="text-muted small">Point your camera at the teacher's QR code.</p>
                
                <div id="scanner-wrapper" style="display:none;">
                    <div id="reader" class="camera-scanner mt-3"></div>
                    <button class="btn btn-secondary mt-3 w-100" onclick="stopScanner()">Cancel Scan</button>
                </div>
                
                <div id="start-scan-wrapper" class="mt-4">
                    <button class="btn btn-primary-erp px-5" onclick="startScanner()">📷 Start Scanner</button>
                </div>
            </div>

            <div class="att-card">
                <h4>Attendance Summary</h4>
                <div class="att-summary-stats" id="att-summary-stats">
                    <div class="att-stat">
                        <span class="num" id="sum-total">0</span>
                        <span class="lbl">Total Classes</span>
                    </div>
                    <div class="att-stat">
                        <span class="num text-success" id="sum-present">0</span>
                        <span class="lbl">Present</span>
                    </div>
                    <div class="att-stat">
                        <span class="num text-primary" id="sum-pct">0%</span>
                        <span class="lbl">Percentage</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: History -->
        <div>
            <div class="att-card">
                <h4>Recent Attendance History</h4>
                <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                    <table class="att-table">
                        <thead>
                            <tr>
                                <th>Subject</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="att-history-body">
                            <tr><td colspan="3" class="text-center text-muted">Loading history...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- HTML5 QR Code Library -->
<script src="https://unpkg.com/html5-qrcode"></script>
