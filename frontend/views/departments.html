<div class="welcome-row d-flex justify-content-between align-items-center">
    <div>
        <h1>Department Configuration</h1>
        <p class="welcome-sub">Configure academic branches, codes, and semesters.</p>
    </div>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addDeptModal">
        🏢 Add Department
    </button>
</div>

<div class="widget">
    <div class="table-responsive">
        <table class="table table-hover align-middle" style="margin-bottom: 0;">
            <thead>
                <tr>
                    <th>Dept Name</th>
                    <th>Code</th>
                    <th>Total Semesters</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="admin-depts-table-body">
                <tr>
                    <td colspan="5">
                        <div class="text-center py-4">
                            <div class="spinner-border text-secondary spinner-border-sm" role="status"></div>
                            <span class="ms-2">Loading departments...</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Add Department Modal -->
<div class="modal fade" id="addDeptModal" tabindex="-1" aria-labelledby="addDeptModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addDeptModalLabel">Add Academic Department</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form onsubmit="addDeptSubmit(event)">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Department Name</label>
                        <input type="text" id="add-d-name" class="form-control" required placeholder="Computer Science & Engineering">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Department Code</label>
                        <input type="text" id="add-d-code" class="form-control" required placeholder="CSE" style="text-transform: uppercase;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Total Semesters</label>
                        <input type="number" id="add-d-sems" class="form-control" required min="1" max="10" value="8">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Department</button>
                </div>
            </form>
        </div>
    </div>
</div>
