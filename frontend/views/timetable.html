<div id="timetable-view">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>Timetable</h2>
            <p class="text-muted">View and manage daily classes and weekly schedule.</p>
        </div>
        <button class="btn btn-primary-erp hidden" id="btn-add-timetable" onclick="openAddTimetableModal()">
            ➕ Add / Edit Class Period
        </button>
    </div>

    <!-- Alert Box -->
    <div class="alert" id="tt-alert" style="display:none;" role="alert"></div>

    <ul class="nav nav-tabs mb-4" id="timetableTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="today-tab" data-bs-toggle="tab" data-bs-target="#today-tt" type="button" role="tab">Today's Classes</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="weekly-tab" data-bs-toggle="tab" data-bs-target="#weekly-tt" type="button" role="tab">Weekly Timetable</button>
        </li>
    </ul>
    
    <div class="tab-content" id="timetableTabsContent">
        <!-- Today Tab -->
        <div class="tab-pane fade show active" id="today-tt" role="tabpanel">
            <div class="tt-card">
                <h4 id="tt-today-title">Today's Schedule</h4>
                <div id="tt-today-container" class="mt-4">
                    <div class="text-center text-muted p-4">Loading today's classes...</div>
                </div>
            </div>
        </div>
        
        <!-- Weekly Tab -->
        <div class="tab-pane fade" id="weekly-tt" role="tabpanel">
            <div class="tt-card">
                <div class="mb-3">
                    <label>Select Day</label>
                    <select class="form-select w-25" id="tt-day-select" onchange="renderWeeklyDay(this.value)">
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                        <option value="Saturday">Saturday</option>
                    </select>
                </div>
                <div id="tt-weekly-container" class="mt-4">
                    <div class="text-center text-muted p-4">Loading weekly schedule...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Add/Edit Timetable Period -->
<div class="modal fade" id="addTimetableModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add / Edit Class Period</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="form-add-timetable" onsubmit="submitTimetableForm(event)">
                <div class="modal-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Department</label>
                            <input type="text" class="form-control" id="tt-modal-dept" required placeholder="e.g. CSE">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Semester</label>
                            <input type="number" class="form-control" id="tt-modal-sem" min="1" max="8" required value="5">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Section</label>
                            <input type="text" class="form-control" id="tt-modal-sec" required placeholder="e.g. A">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Day of Week</label>
                            <select class="form-select" id="tt-modal-day" required>
                                <option value="Monday">Monday</option>
                                <option value="Tuesday">Tuesday</option>
                                <option value="Wednesday">Wednesday</option>
                                <option value="Thursday">Thursday</option>
                                <option value="Friday">Friday</option>
                                <option value="Saturday">Saturday</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Period Number</label>
                            <select class="form-select" id="tt-modal-period-no" required>
                                <option value="1">Period 1</option>
                                <option value="2">Period 2</option>
                                <option value="3">Period 3</option>
                                <option value="4">Period 4</option>
                                <option value="5">Period 5</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Start Time</label>
                            <input type="time" class="form-control" id="tt-modal-start" required value="09:00">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">End Time</label>
                            <input type="time" class="form-control" id="tt-modal-end" required value="10:00">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Subject ID / Code</label>
                        <input type="text" class="form-control" id="tt-modal-subject" required placeholder="e.g. CSE-501 or Data Structures">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Classroom / Lab Room</label>
                        <input type="text" class="form-control" id="tt-modal-room" required placeholder="e.g. B-204">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Class Period</button>
                </div>
            </form>
        </div>
    </div>
</div>
