<div class="welcome-row d-flex justify-content-between align-items-center">
    <div>
        <h1>Faculty Management</h1>
        <p class="welcome-sub">Manage teacher profiles, designations, and system credentials.</p>
    </div>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addTeacherModal">
        ➕ Add Faculty
    </button>
</div>

<div class="widget">
    <div class="table-responsive">
        <table class="table table-hover align-middle" style="margin-bottom: 0;">
            <thead>
                <tr>
                    <th>Emp ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Dept / Designation</th>
                    <th>Assigned Subjects</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="admin-teachers-table-body">
                <tr>
                    <td colspan="7">
                        <div class="text-center py-4">
                            <div class="spinner-border text-secondary spinner-border-sm" role="status"></div>
                            <span class="ms-2">Loading faculty list...</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Add Teacher Modal -->
<div class="modal fade" id="addTeacherModal" tabindex="-1" aria-labelledby="addTeacherModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addTeacherModalLabel">Register New Faculty</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form onsubmit="addTeacherSubmit(event)">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Full Name</label>
                        <input type="text" id="add-t-name" class="form-control" required placeholder="Dr. Jane Doe">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Email Address</label>
                        <input type="email" id="add-t-email" class="form-control" required placeholder="teacher@college.edu">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Password</label>
                        <input type="password" id="add-t-password" class="form-control" required placeholder="••••••••">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Employee ID</label>
                        <input type="text" id="add-t-empid" class="form-control" required placeholder="EMP202601">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Department</label>
                        <select id="add-t-dept" class="form-select" required>
                            <option value="" disabled selected>Select Department</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Designation</label>
                        <input type="text" id="add-t-designation" class="form-control" placeholder="Assistant Professor" value="Assistant Professor">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Faculty</button>
                </div>
            </form>
        </div>
    </div>
</div>
