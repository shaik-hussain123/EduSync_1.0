<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduSync Dashboard — Smart Campus ERP">
    <title>Dashboard — EduSync</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS Architecture -->
    <link rel="stylesheet" href="../css/dashboard-layout.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/profile.css">
    <link rel="stylesheet" href="../css/face.css">
    <!-- Component Specific CSS -->
    <link rel="stylesheet" href="../css/attendance.css">
    <link rel="stylesheet" href="../css/teacher_attendance.css">
    <link rel="stylesheet" href="../css/timetable.css">
    <link rel="stylesheet" href="../css/leave.css">
    <link rel="stylesheet" href="../css/notification.css">
    <link rel="stylesheet" href="../css/settings.css">
</head>

<body>

<!-- ── Mobile sidebar overlay ─────────────────────────────────────────── -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- ── Dashboard Shell ────────────────────────────────────────────────── -->
<div class="dash-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar-container"></aside>

    <!-- MAIN AREA -->
    <div class="main-area">

        <!-- TOP NAVBAR -->
        <header class="topbar" role="banner" id="topbar-container"></header>

        <!-- PAGE CONTENT -->
        <main class="page-content" role="main">
            <!-- Loading indicator before view loads -->
            <div id="main-content">
                <div class="d-flex align-items-center justify-content-center" style="min-height:300px">
                    <div class="spinner-border text-secondary" role="status"></div>
                </div>
            </div>
            
            <!-- FOOTER -->
            <div id="footer-container"></div>
        </main>

    </div>

</div>

<!-- HTML5 QR Code Scanner & Generator Libraries -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- EduSync Scripts -->
<script src="../js/config.js"></script>
<script src="../js/layout.js"></script>

<!-- Component Specific JS -->
<script src="../js/dashboard.js"></script>
<script src="../js/profile.js"></script>
<script src="../js/face.js"></script>
<script src="../js/attendance.js"></script>
<script src="../js/teacher_attendance.js"></script>
<script src="../js/timetable.js"></script>
<script src="../js/leave.js"></script>
<script src="../js/notification.js"></script>
<script src="../js/settings.js"></script>
<script src="../js/admin.js"></script>

</body>
</html>
