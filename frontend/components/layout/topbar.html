<div class="topbar-left">
    <!-- Mobile hamburger -->
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar" onclick="toggleSidebar()">☰</button>
    <span class="topbar-title" id="topbar-title">Dashboard</span>
</div>

<div class="topbar-right">
    <span class="topbar-date" id="topbar-date"></span>

    <button class="topbar-notif" aria-label="Notifications" onclick="loadView('notifications')">
        🔔
        <span class="notif-dot" id="notif-dot" style="display:none"></span>
    </button>

    <div class="topbar-profile" onclick="loadView('profile')">
        <div class="topbar-avatar" id="topbar-avatar-initial"></div>
        <span class="topbar-name" id="topbar-name">Loading...</span>
    </div>
</div>
